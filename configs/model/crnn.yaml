# configs/model/crnn.yaml
# 基於 ResNet 編碼器與時序 BiLSTM + CTC 解碼器的非自迴歸樂譜識別配置

# 影像編碼器主幹名稱，指定為 resnet 以啟用動態寬度影像管道
encoder_name: resnet

encoder:
  _target_: src.model.encoders.ResNetEncoder
  d_model: ${model.d_model}

# === 基礎特徵維度 ===
d_model: 384
dropout: 0.1

# === 全新引進：CRNN + CTC 核心配置 ===
use_ctc: true            # 核心開關：啟動非自迴歸 CTC 損失與解碼流水線
rnn_hidden_dim: 256      # BiLSTM 單向隱藏層維度 (雙向展開後特徵維度為 256 * 2 = 512)
rnn_bidirectional: true  # 啟用雙向時序建模，融合樂譜左右視覺上下文
decoder_layers: 2        # 巧妙複用：在此架構下代表堆疊 2 層雙向 LSTM

# === 以下為原本 BART 自迴歸的參數，在 CTC 模式下不會被使用，但保留以維持 Schema 完整性 ===
decoder_heads: 6
decoder_ffn_dim: 1536
max_decoder_positions: 512
scale_embedding: true
eos_weight: 1.0          # CTC 模式由 Blank 負責對齊，故不需要特別對 EOS 加權

# === 多頭損失函數權重 (CTC 模式下四個分頭權重皆設為 1.0) ===
loss_weights:
  type: 1.0
  pitch: 1.0
  rhythm: 1.0
  attribute: 1.0

# === 缺漏類別遮罩配置 ===
mask_null_in_loss:
  pitch: false
  rhythm: false
  attribute: false
