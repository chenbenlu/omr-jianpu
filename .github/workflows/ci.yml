name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR / branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install system libs (cairosvg needs libcairo2)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libcairo2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          # We use requirements.txt (no uv.lock). Without this override the
          # action errors out: "No file in ... matched to [**/uv.lock]".
          cache-dependency-glob: requirements.txt

      # CI runs CPU-only on GitHub-hosted runners; install a CPU torch wheel so
      # `import torch` works for any tests that touch the model module. The real
      # CUDA-enabled torch comes from the Docker base image in dev.
      - name: Install CPU torch
        run: uv pip install --system torch==2.8.0 torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install project deps
        run: uv pip install --system -r requirements.txt

      - name: ruff
        run: ruff check .

      - name: black --check
        run: black --check .

      - name: pytest
        run: pytest -q

  branch-name-check:
    name: branch name follows convention
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate branch name
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          echo "Branch: $BRANCH"
          if ! echo "$BRANCH" | grep -Eq '^(feature|fix|exp|docs|chore)/[A-D]-[a-z0-9-]+$'; then
            echo "::error::Branch '$BRANCH' does not match <type>/<A|B|C|D>-<kebab-slug>."
            echo "Allowed types: feature, fix, exp, docs, chore."
            echo "See docs/GIT_WORKFLOW.md."
            exit 1
          fi
